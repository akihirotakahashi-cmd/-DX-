name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: chihousousei
          POSTGRES_PASSWORD: password
          POSTGRES_DB: chihousousei_dx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install "poetry>=2.0"

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('src/backend/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      - name: Run Ruff lint
        run: poetry run ruff check .

      - name: Run mypy
        run: poetry run mypy app --ignore-missing-imports

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://chihousousei:password@localhost:5432/chihousousei_dx_test
        run: poetry run alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://chihousousei:password@localhost:5432/chihousousei_dx_test
          APP_ENV: test
          COGNITO_USER_POOL_ID: dummy
          COGNITO_CLIENT_ID: dummy
          ANTHROPIC_API_KEY: dummy
        run: poetry run pytest tests/ -v --tb=short

  frontend:
    name: Frontend — type-check & lint
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: dummy
          NEXT_PUBLIC_COGNITO_CLIENT_ID: dummy
